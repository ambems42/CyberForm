<div class="container">
  <h2>{{ 'FORGOT_PASSWORD.TITLE' | translate }}</h2>

  <form (ngSubmit)="requestReset()">
    <label for="email">{{ 'FORGOT_PASSWORD.EMAIL' | translate }}</label>
    <input
      type="email"
      id="email"
      [(ngModel)]="email"
      name="email"
      required
      [placeholder]="'FORGOT_PASSWORD.PLACEHOLDER' | translate"
    />

    <button type="submit">{{ 'FORGOT_PASSWORD.SUBMIT' | translate }}</button>
  </form>

  <div *ngIf="message" class="success">{{ message }}</div>
  <div *ngIf="error" class="error">{{ error }}</div>

  <div class="back-link">
    <a routerLink="/login">{{ 'FORGOT_PASSWORD.BACK' | translate }}</a>
  </div>
</div>
